services:
  postgres:
    image: postgres:16-alpine
    container_name: ticketplatform_db
    environment:
      POSTGRES_USER: ticketuser
      POSTGRES_PASSWORD: ticketpass
      POSTGRES_DB: ticketplatform
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ticketuser -d ticketplatform']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: